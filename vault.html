<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ BusGo Private Vault</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --accent-color: #6a0dad; /* Gothic Purple */
            --text-color: #e0e0e0;
            --panel-bg: #16161a;
            --border-color: #2d2d35;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .vault-container {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            width: 90%;
            max-width: 800px;
            padding: 40px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--accent-color);
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #888;
        }

        input {
            width: 100%;
            padding: 12px;
            background-color: #000;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #fff;
            font-family: inherit;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #8a2be2;
        }

        #content-area {
            display: none;
            text-align: left;
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid var(--border-color);
            line-height: 1.6;
            animation: fadeIn 1s ease;
        }

        #content-area h1, #content-area h2, #content-area h3 {
            color: var(--accent-color);
        }

        #content-area code {
            background-color: #000;
            padding: 2px 4px;
            border-radius: 4px;
        }

        .error-message {
            color: #ff4d4d;
            margin-top: 15px;
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #555;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="vault-container" id="vault-box">
        <h1>🔒 BusGo Private Vault</h1>
        <p style="color: #666; margin-bottom: 30px;">Enter credentials to reveal the sacred scrolls.</p>
        
        <div class="input-group">
            <label for="username">GitHub Username</label>
            <input type="text" id="username" placeholder="e.g., NimuthuGanegoda">
        </div>
        
        <div class="input-group">
            <label for="password">Private Key</label>
            <input type="password" id="password" placeholder="Enter your secret password">
        </div>
        
        <button onclick="unlockVault()">Unlock Vault</button>
        <div id="error-msg" class="error-message">❌ Invalid credentials. The vault remains sealed.</div>

        <div id="content-area"></div>

        <div class="footer">
            Dedicated to the Database Manager & Lead Prototyper.
        </div>
    </div>

        function unlockVault() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('error-msg');
            const content = document.getElementById('content-area');

            if (DATA[user]) {
                try {
                    const decrypted = CryptoJS.AES.decrypt(DATA[user], pass).toString(CryptoJS.enc.Utf8);
                    if (decrypted) {
                        content.innerHTML = marked.parse(decrypted);
                        content.style.display = 'block';
                        error.style.display = 'none';
                        document.querySelector('.input-group:nth-of-type(1)').style.display = 'none';
                        document.querySelector('.input-group:nth-of-type(2)').style.display = 'none';
                        document.querySelector('button').style.display = 'none';
                        document.querySelector('p').innerText = "Welcome back, " + user + ". Your secrets are revealed.";

                        throw new Error();
                    }

                    error.style.display = 'block';
                    content.style.display = 'none';
                }
            } else {
                error.style.display = 'block';
                content.style.display = 'none';
